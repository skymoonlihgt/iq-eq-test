<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Firebase Auth Demo</title>
    <style>
      body { font-family: Arial, system-ui; padding: 20px; }
      button { padding: 10px 14px; margin: 6px; }
      #status { margin-top: 12px; color: #234; }
    </style>
    <!-- Firebase Web SDK (cdn) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  </head>
  <body>
    <h1>Firebase Auth — Demo (Vanilla JS)</h1>
    <p>Sign in options:</p>
    <div>
      <button id="btnGoogle">Sign in with Google</button>
      <button id="btnApple">Sign in with Apple</button>
      <button id="btnKakao">Sign in with Kakao (via function)</button>
      <button id="btnNaver">Sign in with Naver (via function)</button>
      <button id="btnSignOut">Sign out</button>
    </div>

    <div id="status">Not signed in</div>

    <script type="module" src="./auth.js"></script>
  </body>
</html>

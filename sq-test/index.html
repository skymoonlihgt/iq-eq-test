<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mind Balance - SQ 멘탈 웰니스 및 스트레스 테스트</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="style.css" />
  
  <meta name="google-adsense-account" content="ca-pub-1484447012475820">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1484447012475820" crossorigin="anonymous"></script>

  <!-- Theme Restore -->
  <script>
    (function() {
      const theme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <!-- 공통 헤더 -->
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo">Mind Balance</a>
      <div class="header-controls">
        <button id="bgmToggleBtn" class="theme-btn" type="button" aria-label="BGM 재생/정지">
          <span class="theme-icon">🎵</span>
        </button>
        <button id="themeToggleBtn" class="theme-btn" type="button" aria-label="화면 모드 변경">
          <span class="theme-icon">🌙</span>
        </button>
      </div>
    </div>
  </header>

  <div class="app-shell test-mode">
    <div class="test-panel">
      <!-- Main view area -->
      <div id="mainView" class="start-view">
        <div class="start-heading">
          <h2>나의 멘탈 웰니스 상태는?</h2>
          <p>SQ(Stress Quotient) 테스트를 통해 현재 스트레스 레벨과 대처 성향을 알아보세요.</p>
        </div>
        
        <button id="startBtn" class="primary-button" onclick="window.location.href='questions.html'">테스트 시작하기</button>

        <!-- 하단 수동 광고 영역 -->
        <div class="adsense-container adsense-slot" style="margin-top: 32px; text-align: center;">
          <ins class="adsbygoogle"
               style="display:block"
               data-ad-client="ca-pub-1484447012475820"
               data-ad-slot="9988776655"
               data-ad-format="auto"
               data-full-width-responsive="true"></ins>
          <script>
               (adsbygoogle = window.adsbygoogle || []).push({});
          </script>
        </div>
      </div>
    </div>
  </div>

  <audio id="bgmAudio" src="../assets/bgm.mp3" loop preload="auto"></audio>

  <script type="module">
    import { initTheme } from '../js/core/theme.js';
    import { initSound } from '../js/core/sound.js';
    
    document.addEventListener('DOMContentLoaded', () => {
      initTheme();
      initSound();
      
      const bgmAudio = document.getElementById('bgmAudio');
      const bgmToggleBtn = document.getElementById('bgmToggleBtn');
      let isBgmPlaying = false;
      
      bgmToggleBtn.addEventListener('click', () => {
        if (isBgmPlaying) {
          bgmAudio.pause();
          bgmToggleBtn.style.opacity = '0.5';
        } else {
          bgmAudio.play().catch(e => console.log('BGM play failed:', e));
          bgmToggleBtn.style.opacity = '1';
        }
        isBgmPlaying = !isBgmPlaying;
      });
    });
  </script>
</body>
</html>

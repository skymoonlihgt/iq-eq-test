<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mind Balance - SQ 테스트 진행</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="style.css" />
  
  <meta name="google-adsense-account" content="ca-pub-1484447012475820">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1484447012475820" crossorigin="anonymous"></script>

  <script>
    (function() {
      const theme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo">Mind Balance</a>
      <button id="themeToggleBtn" class="theme-btn" type="button" aria-label="화면 모드 변경">
        <span class="theme-icon">🌙</span>
      </button>
    </div>
  </header>

  <div class="app-shell test-mode">
    <div class="test-panel" id="testPanel">
      <div class="topbar" id="progressTopbar">
        <div class="progress-summary">
          <div class="progress-track"><div id="progressFill"></div></div>
          <span>진행률: <span id="progressText">0 / 20</span></span>
        </div>
      </div>
      
      <div id="mainView" class="question-view-container">
        <!-- Questions will be rendered here -->
      </div>

      <div class="adsense-container adsense-slot" id="questionAd" style="margin-top: 32px; text-align: center;">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-1484447012475820"
             data-ad-slot="9988776656"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
      </div>
    </div>
  </div>

  <!-- Loading Screen (Hidden by default) -->
  <div id="loadingScreen" class="loading-screen" style="display:none;">
    <h2>정밀 분석 중...</h2>
    <p>당신의 멘탈 상태를 진단하고 있습니다.</p>
    <div class="spinner"></div>
    <div class="adsense-container adsense-slot" style="margin-top: 32px; text-align: center; width: 100%; max-width: 300px;">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-1484447012475820"
           data-ad-slot="9988776657"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
    </div>
  </div>

  <script type="module" src="script.js"></script>
  <script type="module">
    import { initTheme } from '../js/core/theme.js';
    initTheme();
  </script>
</body>
</html>

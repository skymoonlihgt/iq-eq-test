<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mind Balance - 나의 4대 테마 심층 분석</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="style.css" />

  <style>
    .analysis-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    .analysis-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .analysis-header h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }
    .analysis-header p {
      color: var(--text-secondary);
      font-size: 1rem;
    }
    .type-badge {
      display: inline-block;
      background: var(--primary-color);
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-weight: bold;
      margin-bottom: 16px;
      font-size: 1.2rem;
    }
    
    .analysis-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 768px) {
      .analysis-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .analysis-card {
      background: var(--surface-color);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border-color);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      display: flex;
      flex-direction: column;
    }
    
    .analysis-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
    }
    
    html[data-theme='dark'] .analysis-card {
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    html[data-theme='dark'] .analysis-card:hover {
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
    }

    .analysis-card-header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
    }
    
    .card-icon {
      font-size: 1.5rem;
      margin-right: 12px;
    }
    
    .card-title-group h3 {
      font-size: 1.1rem;
      margin: 0;
      color: var(--text-color);
    }
    
    .card-subtitle {
      font-size: 0.85rem;
      color: var(--primary-color);
      font-weight: 600;
      margin-top: 4px;
    }

    .analysis-card-body p {
      margin: 0;
      line-height: 1.6;
      color: var(--text-secondary);
      font-size: 0.95rem;
      word-break: keep-all;
    }

    .back-btn-container {
      margin-top: 32px;
      text-align: center;
    }
    
    .back-button {
      background: var(--surface-color);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    .back-button:hover {
      background: var(--border-color);
    }
  </style>
</head>
<body>
  <!-- 공통 헤더 -->
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo">Mind Balance</a>
    </div>
  </header>

  <div class="app-shell test-mode">
    <div class="analysis-container" id="analysisContainer">
      <div style="text-align: center; padding: 50px;">
        <p>데이터를 불러오는 중입니다...</p>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const container = document.getElementById('analysisContainer');
      const urlParams = new URLSearchParams(window.location.search);
      const type = urlParams.get('type');

      if (!type) {
        container.innerHTML = `
          <div style="text-align:center; padding: 50px;">
            <p>잘못된 접근입니다. 유형 정보가 없습니다.</p>
            <button class="back-button" onclick="history.back()" style="margin-top:20px;">뒤로 가기</button>
          </div>`;
        return;
      }

      try {
        const res = await fetch('./analysis.json');
        if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
        const data = await res.json();

        // If specific type is not found, fallback to INFP (as default example)
        const analysisData = data[type] || data['INFP'];

        if (!analysisData) {
          throw new Error('Analysis data not found');
        }

        renderAnalysis(type, analysisData);

      } catch (e) {
        console.error('Analysis load error:', e);
        container.innerHTML = `
          <div style="text-align:center; padding: 50px;">
            <p>분석 데이터를 불러오는데 실패했습니다.</p>
            <button class="back-button" onclick="history.back()" style="margin-top:20px;">뒤로 가기</button>
          </div>`;
      }
    });

    function renderAnalysis(type, data) {
      const container = document.getElementById('analysisContainer');
      
      const themes = ['burnout', 'romance', 'friendship', 'life', 'religion', 'allergy', 'spending', 'prescription'];
      
      const cardsHtmlContent = themes.map(key => {
        const item = data[key];
        if (!item) return '';
        return `
          <div class="analysis-card">
            <div class="analysis-card-header">
              <div class="card-title-group">
                <h3>${item.title}</h3>
              </div>
            </div>
            <div class="analysis-card-body">
              <p>${item.desc}</p>
            </div>
          </div>
        `;
      }).join('');

      const cardsHtml = `
        <div class="analysis-header">
          <div class="type-badge">${type}</div>
          <h1>나의 8대 테마 심층 분석</h1>
          <p>일상 속 당신의 진짜 모습을 확인해보세요.</p>
        </div>

        <div class="analysis-grid">
          ${cardsHtmlContent}
        </div>

        <div class="back-btn-container">
          <button class="back-button" onclick="history.back()">⬅ 결과 화면으로 돌아가기</button>
        </div>
      `;

      container.innerHTML = cardsHtml;
    }
  </script>
</body>
</html>
